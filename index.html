<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>佛系計數計時器 v1.7</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #F5F5DC; font-family: sans-serif; user-select: none; }

        /* 上半部：縮小高度以預留更多下半部空間 */
        #top-section {
            height: 35vh; width: 100%; background: #ffffff; border-bottom: 2px solid #8B4513;
            position: relative; overflow: hidden; touch-action: none;
        }
        #slider { display: flex; width: 200%; height: 100%; transition: transform 0.3s ease; }
        .slide-page { width: 50%; height: 100%; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; }
        #green-dot { width: 80px; height: 80px; background-color: #008000; border-radius: 50%; transform: translate(0,0) scale(1); box-shadow: 0 4px 10px rgba(0,0,0,0.1); touch-action: none; }
        #buddha-img { max-height: 85%; max-width: 85%; transform: translate(0,0) scale(1); object-fit: contain; touch-action: none; }

        /* 下半部：強制分配空間 */
        #bottom-section { height: 65vh; width: 100%; position: relative; display: flex; flex-direction: column; align-items: center; padding: 10px; }
        #click-area { width: 100%; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; }
        #sacred-text { color: #8B4513; font-family: '標楷體'; font-size: 22px; font-weight: 900; }
        #counter { color: #00008B; font-size: 80px; font-weight: bold; line-height: 1.1; margin: 5px 0; }
        #timer-display { font-size: 1.2rem; font-family: monospace; color: #444; font-weight: bold; }
        #projection-info { font-size: 0.85rem; color: #d35400; font-weight: bold; margin-top: 5px; text-align: center; }

        /* 按鈕區：垂直排列以確保點擊範圍 */
        .ui-panel { width: 100%; display: flex; flex-direction: column; gap: 8px; padding-bottom: 10px; }
        .row { display: flex; gap: 8px; width: 100%; }
        .btn { padding: 14px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: white; flex: 1; font-size: 1rem; transition: background 0.3s; }
        
        #audio-toggle-btn { background-color: #4A90E2; }
        #audio-toggle-btn.playing { background-color: #555; }
        #auto-btn { background-color: #27ae60; flex: 0 0 80px; }
        #auto-btn.active { background-color: #e67e22; }
        .btn-reset { background-color: #d9534f; }
        .btn-timer-stop { background-color: #e74c3c; width: 100%; padding: 18px; }
        
        #history-btn { position: absolute; right: 15px; top: 10px; width: 40px; height: 40px; border-radius: 50%; background: #fff; border: 2px solid #8B4513; display: flex; align-items: center; justify-content: center; z-index: 200; }
        #history-panel { position: absolute; top: 50px; right: 10px; width: 240px; background: white; border: 2px solid #8B4513; border-radius: 8px; display: none; z-index: 1000; padding: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .dots-nav { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; }
        .dot-nav { width: 6px; height: 6px; border-radius: 50%; background: #ccc; }
        .dot-nav.active { background: #8B4513; }
    </style>
</head>
<body>
    <div id="top-section">
        <div id="slider">
            <div class="slide-page"><div id="green-dot"></div></div>
            <div class="slide-page"><img id="buddha-img" src="1000010289.png" alt="大自在王佛"></div>
        </div>
        <div id="history-btn" onclick="toggleHistory()">🕒</div>
        <div class="dots-nav">
            <div id="dot1" class="dot-nav active"></div>
            <div id="dot2" class="dot-nav"></div>
        </div>
    </div>

    <div id="bottom-section">
        <div id="history-panel">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <strong>歷史紀錄</strong>
                <span onclick="toggleHistory()" style="cursor:pointer; font-size: 20px;">✕</span>
            </div>
            <div id="hist-list" style="max-height: 200px; overflow-y: auto;"></div>
        </div>
        
        <div id="click-area" onclick="manualCount()">
            <div id="sacred-text">南無本師大自在王佛</div>
            <div id="counter">0</div>
            <div id="timer-display">00:00:00</div>
            <div id="projection-info"></div>
        </div>

        <div class="ui-panel">
            <div class="row">
                <button id="audio-toggle-btn" class="btn" onclick="toggleAudioAndTimer()">▶ 播放/計時</button>
                <button id="auto-btn" class="btn" onclick="toggleAuto()">自動</button>
            </div>
            <div class="row">
                <button class="btn btn-reset" onclick="safeReset()">歸零</button>
                <button class="btn" style="background:#8B4513;" onclick="resize(-10)">－</button>
                <button class="btn" style="background:#8B4513;" onclick="resize(10)">＋</button>
            </div>
            <button id="stop-btn" class="btn btn-timer-stop" onclick="stopTask()">結束並記錄本次練習</button>
        </div>
    </div>

    <audio id="sacred-audio" src="南無本師大自在王佛.wav" preload="auto" loop></audio>

    <script>
        let count = parseInt(localStorage.getItem('myCounter')) || 0;
        let fontSize = parseInt(localStorage.getItem('myFontSize')) || 80;
        let historyArr = JSON.parse(localStorage.getItem('myHistory')) || [];
        let timerInterval, autoInterval, elapsedTime = 0, startTime, running = false, autoRunning = false;
        const audio = document.getElementById('sacred-audio');
        const toggleBtn = document.getElementById('audio-toggle-btn');
        const autoBtn = document.getElementById('auto-btn');
        const projInfo = document.getElementById('projection-info');

        function updateDisplay() {
            document.getElementById('counter').innerText = count;
            document.getElementById('counter').style.fontSize = fontSize + "px";
            localStorage.setItem('myCounter', count);
            if (count >= 30000) projInfo.innerText = "九字禪已達成三萬聲！";
            else if (count > 0) {
                const remainingMs = (30000 - count) * 500;
                const f = new Date(Date.now() + remainingMs);
                projInfo.innerText = `預估: ${f.getHours()}:${String(f.getMinutes()).padStart(2,'0')} 完成`;
            } else projInfo.innerText = "";
        }

        function manualCount() { count++; if(autoRunning) toggleAuto(); updateDisplay(); }

        function toggleAudioAndTimer() {
            if (!running) { audio.play(); startTimer(); toggleBtn.innerText = "■ 停止"; toggleBtn.classList.add('playing'); } 
            else { audio.pause(); pauseTimer(); if(autoRunning) toggleAuto(); toggleBtn.innerText = "▶ 播放/計時"; toggleBtn.classList.remove('playing'); }
        }

        function toggleAuto() {
            if (!autoRunning) {
                if(!running) return alert("請先開啟音檔與計時");
                autoInterval = setInterval(() => { count++; updateDisplay(); }, 500);
                autoBtn.innerText = "停止"; autoBtn.classList.add('active'); autoRunning = true;
            } else {
                clearInterval(autoInterval); autoBtn.innerText = "自動"; autoBtn.classList.remove('active'); autoRunning = false;
            }
        }

        function startTimer() { startTime = Date.now(); timerInterval = setInterval(() => { const now = Date.now(); document.getElementById('timer-display').innerText = formatTime(elapsedTime + (now - startTime)); }, 1000); running = true; }
        function pauseTimer() { clearInterval(timerInterval); elapsedTime += (Date.now() - startTime); running = false; }
        function formatTime(ms) { let t = Math.floor(ms/1000); return `${String(Math.floor(t/3600)).padStart(2,'0')}:${String(Math.floor((t%3600)/60)).padStart(2,'0')}:${String(t%60).padStart(2,'0')}`; }
        function resize(d) { fontSize += d; if(fontSize < 40) fontSize = 40; updateDisplay(); localStorage.setItem('myFontSize', fontSize); }
        function safeReset() { if (confirm("⚠️ 確定要歸零？")) { if (count > 0) saveHistory(count, formatTime(elapsedTime)); count = 0; elapsedTime = 0; document.getElementById('timer-display').innerText="00:00:00"; updateDisplay(); } }
        function saveHistory(v, d) { historyArr.unshift({time: new Date().toLocaleString(), val: v, duration: d}); localStorage.setItem('myHistory', JSON.stringify(historyArr.slice(0, 20))); }
        function stopTask() { if (running) toggleAudioAndTimer(); if (count > 0) saveHistory(count, formatTime(elapsedTime)); alert(`本次練習：${count} 次`); count = 0; elapsedTime = 0; document.getElementById('timer-display').innerText="00:00:00"; updateDisplay(); }

        // 滑動與觸控
        const slider = document.getElementById('slider');
        const dot1 = document.getElementById('dot1');
        const dot2 = document.getElementById('dot2');
        let startX = 0, cur = 0;
        document.getElementById('top-section').addEventListener('touchstart', e => startX = e.touches[0].pageX);
        document.getElementById('top-section').addEventListener('touchend', e => {
            let diff = startX - e.changedTouches[0].pageX;
            if (Math.abs(diff) > 50) { cur = diff > 0 ? 1 : 0; slider.style.transform = `translateX(-${cur * 50}%)`; dot1.classList.toggle('active', cur === 0); dot2.classList.toggle('active', cur === 1); }
        });
        
        function toggleHistory() {
            const p = document.getElementById('history-panel');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
            if(p.style.display === 'block') document.getElementById('hist-list').innerHTML = historyArr.map(h => `<div>${h.time}: ${h.val}次 (${h.duration})</div>`).join('');
        }
        updateDisplay();
    </script>
</body>
</html>
