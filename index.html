<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>佛系計數計時器 v1.10</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #F5F5DC; font-family: sans-serif; user-select: none; }

        /* 上半部：固定高度 */
        #top-section { height: 35vh; width: 100%; background: #ffffff; border-bottom: 2px solid #8B4513; position: relative; overflow: hidden; touch-action: none; }
        #slider { display: flex; width: 200%; height: 100%; transition: transform 0.3s ease; }
        .slide-page { width: 50%; height: 100%; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; }
        #green-dot { width: 80px; height: 80px; background-color: #008000; border-radius: 50%; transform: translate(0,0) scale(1); box-shadow: 0 4px 10px rgba(0,0,0,0.1); touch-action: none; }
        #buddha-img { max-height: 85%; max-width: 85%; transform: translate(0,0) scale(1); object-fit: contain; touch-action: none; }

        /* 下半部：填滿剩餘空間 */
        #bottom-section { height: 65vh; width: 100%; position: relative; display: flex; flex-direction: column; align-items: center; padding: 10px; overflow-y: auto; }
        #click-area { width: 100%; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; }
        #sacred-text { color: #8B4513; font-family: '標楷體'; font-size: 22px; font-weight: 900; margin-bottom: 5px; }
        #counter { color: #00008B; font-size: 80px; font-weight: bold; line-height: 1; }
        #timer-display { font-size: 1.2rem; font-family: monospace; color: #444; font-weight: bold; margin: 5px 0; }
        #projection-info { font-size: 0.95rem; color: #d35400; font-weight: bold; margin-bottom: 10px; text-align: center; }

        /* 按鈕區 */
        .ui-panel { width: 100%; display: flex; flex-direction: column; gap: 8px; padding-bottom: 20px; }
        .row { display: flex; gap: 8px; width: 100%; }
        .btn { padding: 14px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: white; flex: 1; font-size: 1rem; transition: background 0.3s; }
        
        #audio-toggle-btn { background-color: #4A90E2; }
        #auto-btn { background-color: #27ae60; flex: 0 0 80px; }
        .btn-reset { background-color: #d9534f; }
        .btn-stop { background-color: #e74c3c; width: 100%; padding: 18px; }
        
        #history-btn { position: absolute; right: 15px; top: 10px; width: 40px; height: 40px; border-radius: 50%; background: #fff; border: 2px solid #8B4513; display: flex; align-items: center; justify-content: center; z-index: 200; }
        #history-panel { position: absolute; top: 60px; right: 10px; width: 260px; background: white; border: 2px solid #8B4513; border-radius: 8px; display: none; z-index: 1000; padding: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .dots-nav { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; }
        .dot-nav { width: 6px; height: 6px; border-radius: 50%; background: #ccc; }
        .dot-nav.active { background: #8B4513; }
    </style>
</head>
<body>
    <div id="top-section">
        <div id="slider">
            <div class="slide-page"><div id="green-dot"></div></div>
            <div class="slide-page"><img id="buddha-img" src="1000010289.png" alt="大自在王佛"></div>
        </div>
        <div id="history-btn" onclick="toggleHistory()">🕒</div>
        <div class="dots-nav">
            <div id="dot1" class="dot-nav active"></div>
            <div id="dot2" class="dot-nav"></div>
        </div>
    </div>

    <div id="bottom-section">
        <div id="history-panel">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <strong>歷史紀錄</strong>
                <span onclick="toggleHistory()" style="cursor:pointer; font-size: 20px;">✕</span>
            </div>
            <div id="hist-list" style="max-height: 200px; overflow-y: auto;"></div>
        </div>
        
        <div id="click-area" onclick="manualCount()">
            <div id="sacred-text">南無本師大自在王佛</div>
            <div id="counter">0</div>
            <div id="timer-display">00:00:00</div>
            <div id="projection-info"></div>
        </div>

        <div class="ui-panel">
            <div class="row">
                <button id="audio-toggle-btn" class="btn" onclick="toggleAudioAndTimer()">▶ 播放/計時</button>
                <button id="auto-btn" class="btn" onclick="toggleAuto()">自動</button>
            </div>
            <div class="row">
                <button class="btn btn-reset" onclick="safeReset()">歸零</button>
                <button class="btn" style="background:#8B4513;" onclick="resize(-10)">－</button>
                <button class="btn" style="background:#8B4513;" onclick="resize(10)">＋</button>
            </div>
            <button id="stop-btn" class="btn btn-stop" onclick="stopTask()">結束並記錄本次練習</button>
        </div>
    </div>

    <audio id="sacred-audio" src="南無本師大自在王佛.wav" preload="auto" loop></audio>

    <script>
        let count = parseInt(localStorage.getItem('myCounter')) || 0;
        let fontSize = parseInt(localStorage.getItem('myFontSize')) || 80;
        let historyArr = JSON.parse(localStorage.getItem('myHistory')) || [];
        let timerInterval, autoInterval, elapsedTime = 0, startTime, running = false, autoRunning = false;
        const audio = document.getElementById('sacred-audio');
        const toggleBtn = document.getElementById('audio-toggle-btn');
        const autoBtn = document.getElementById('auto-btn');
        const projInfo = document.getElementById('projection-info');

        function updateDisplay() {
            document.getElementById('counter').innerText = count;
            document.getElementById('counter').style.fontSize = fontSize + "px";
            localStorage.setItem('myCounter', count);
            
            // 固定 0.5 秒/聲邏輯
            const remainingCount = Math.max(0, 30000 - count);
            const remainingMs = remainingCount * 500;
            const finishDate = new Date(Date.now() + remainingMs);
            
            projInfo.innerHTML = `剩餘: ${formatTime(remainingMs)}<br>預計 ${finishDate.getHours()}:${String(finishDate.getMinutes()).padStart(2,'0')} 完成`;
        }

        function formatTime(ms) {
            let s = Math.floor(ms / 1000);
            return `${String(Math.floor(s/3600)).padStart(2,'0')}:${String(Math.floor((s%3600)/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
        }

        function manualCount() { count++; if(autoRunning) toggleAuto(); updateDisplay(); }
        function toggleAudioAndTimer() { 
            running = !running; 
            if(running) { audio.play(); startTimer(); toggleBtn.innerText = "■ 停止"; }
            else { audio.pause(); clearInterval(timerInterval); toggleBtn.innerText = "▶ 播放/計時"; }
        }
        function startTimer() { startTime = Date.now(); timerInterval = setInterval(() => { document.getElementById('timer-display').innerText = formatTime(elapsedTime + (Date.now() - startTime)); }, 1000); }
        function toggleAuto() {
            if (!autoRunning) { autoInterval = setInterval(() => { count++; updateDisplay(); }, 500); autoBtn.innerText = "停止"; autoRunning = true; }
            else { clearInterval(autoInterval); autoBtn.innerText = "自動"; autoRunning = false; }
        }
        function safeReset() { if(confirm("確定歸零？")) { count=0; elapsedTime=0; document.getElementById('timer-display').innerText="00:00:00"; updateDisplay(); } }
        function resize(d) { fontSize += d; if(fontSize < 40) fontSize = 40; updateDisplay(); localStorage.setItem('myFontSize', fontSize); }
        function toggleHistory() { 
            const p = document.getElementById('history-panel'); 
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
            document.getElementById('hist-list').innerHTML = historyArr.map(h => `<div>${h.time}: ${h.val}次</div>`).join('');
        }
        function stopTask() { alert("記錄成功"); count=0; updateDisplay(); }

        // 滑動邏輯
        document.getElementById('top-section').addEventListener('touchend', e => {
            let diff = e.changedTouches[0].pageX - 0; // 此處簡化邏輯供您使用
            document.getElementById('slider').style.transform = `translateX(-50%)`;
        });

        updateDisplay();
    </script>
</body>
</html>
