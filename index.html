<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>佛系計數計時器 v1.0</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #F5F5DC; font-family: sans-serif; user-select: none; }

        /* 上半部：滑動顯示區 (綠點 / 佛像) */
        #top-section {
            height: 45vh; width: 100%; background: #ffffff; border-bottom: 2px solid #8B4513;
            position: relative; overflow: hidden; touch-action: none;
        }
        #slider { display: flex; width: 200%; height: 100%; transition: transform 0.3s ease; }
        .slide-page { width: 50%; height: 100%; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; }
        #green-dot { width: 100px; height: 100px; background-color: #008000; border-radius: 50%; transform: translate(0,0) scale(1); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #buddha-img { max-height: 95%; max-width: 95%; transform: translate(0,0) scale(1); object-fit: contain; }

        /* 下半部：計數與計時區 */
        #bottom-section { height: 55vh; width: 100%; position: relative; display: flex; flex-direction: column; align-items: center; padding-top: 10px; }
        
        #click-area { width: 100%; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; }
        #sacred-text { color: #8B4513; font-family: '標楷體'; font-size: 24px; font-weight: 900; margin-bottom: 5px; }
        #counter { color: #00008B; font-size: 100px; font-weight: bold; line-height: 1; }
        #timer-display { font-size: 1.5rem; font-family: monospace; color: #444; margin: 10px 0; font-weight: bold; }

        /* 按鈕區 */
        .ui-panel { width: 95%; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .btn { padding: 12px 18px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; min-width: 80px; transition: background 0.3s; }
        
        /* 播放/停止複合鈕樣式 */
        #audio-toggle-btn { background-color: #4A90E2; width: 200px; font-size: 1.1rem; }
        #audio-toggle-btn.playing { background-color: #555; } /* 播放中變灰色 */

        .btn-timer-stop { background-color: #e74c3c; flex: 1 1 90%; margin-top: 5px; } 
        .btn-reset { background-color: #d9534f; font-size: 12px; }
        
        /* 輔助按鈕 */
        #history-btn { position: absolute; right: 15px; top: -55px; width: 44px; height: 44px; border-radius: 50%; background: #fff; border: 2px solid #8B4513; display: flex; align-items: center; justify-content: center; font-size: 22px; z-index: 200; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        #history-panel { position: absolute; top: -10px; right: 15px; width: 220px; background: white; border: 2px solid #8B4513; border-radius: 8px; display: none; z-index: 1000; padding: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .dots-nav { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; }
        .dot-nav { width: 6px; height: 6px; border-radius: 50%; background: #ccc; }
        .dot-nav.active { background: #8B4513; }
    </style>
</head>
<body>

    <div id="top-section">
        <div id="slider">
            <div class="slide-page"><div id="green-dot"></div></div>
            <div class="slide-page"><img id="buddha-img" src="1000010289.png" alt="大自在王佛"></div>
        </div>
        <div id="history-btn">🕒</div>
        <div class="dots-nav">
            <div id="dot1" class="dot-nav active"></div>
            <div id="dot2" class="dot-nav"></div>
        </div>
    </div>

    <div id="bottom-section">
        <div id="history-panel">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <strong>歷史紀錄</strong>
                <span onclick="toggleHistory()" style="cursor:pointer; font-size: 20px;">✕</span>
            </div>
            <div id="hist-list" style="max-height: 250px; overflow-y: auto;"></div>
        </div>
        
        <div id="click-area">
            <div id="sacred-text">南無本師大自在王佛</div>
            <div id="counter">0</div>
            <div id="timer-display">00:00:00</div>
        </div>

        <div class="ui-panel">
            <button id="audio-toggle-btn" class="btn" onclick="toggleAudioAndTimer()">▶ 播放音檔 & 計時</button>
            
            <div style="display:flex; gap:8px;">
                <button class="btn btn-reset" onclick="safeReset()">歸零</button>
                <button class="btn" style="background:#8B4513;" onclick="resize(-10)">－</button>
                <button class="btn" style="background:#8B4513;" onclick="resize(10)">＋</button>
            </div>

            <button id="stop-btn" class="btn btn-timer-stop">結束並記錄本次練習</button>
        </div>
        
        <div id="debug-info" style="font-size: 10px; color: #8B4513; margin-bottom: 5px;">v1.0 | 循環播放切換版</div>
    </div>

    <audio id="sacred-audio" src="南無本師大自在王佛.wav" preload="auto" loop></audio>

    <script>
        let count = parseInt(localStorage.getItem('myCounter')) || 0;
        let fontSize = parseInt(localStorage.getItem('myFontSize')) || 100;
        let historyArr = JSON.parse(localStorage.getItem('myHistory')) || [];
        let timerInterval, elapsedTime = 0, startTime, running = false;
        const audio = document.getElementById('sacred-audio');
        const toggleBtn = document.getElementById('audio-toggle-btn');

        function updateDisplay() {
            document.getElementById('counter').innerText = count;
            document.getElementById('counter').style.fontSize = fontSize + "px";
            localStorage.setItem('myCounter', count);
        }

        // --- 音檔與計時切換核心邏輯 ---
        function toggleAudioAndTimer() {
            if (!running) {
                // 開始播放與計時
                audio.play();
                startTimer();
                toggleBtn.innerText = "■ 停止音檔 & 暫停";
                toggleBtn.classList.add('playing');
            } else {
                // 停止播放與暫停計時
                audio.pause();
                // 若要每次停止都回到音檔開頭，請取消下面這行註釋
                // audio.currentTime = 0; 
                pauseTimer();
                toggleBtn.innerText = "▶ 播放音檔 & 計時";
                toggleBtn.classList.remove('playing');
            }
        }

        function startTimer() {
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const now = Date.now();
                document.getElementById('timer-display').innerText = formatTime(elapsedTime + (now - startTime));
            }, 10);
            running = true;
        }

        function pauseTimer() {
            clearInterval(timerInterval);
            elapsedTime += (Date.now() - startTime);
            running = false;
        }

        function formatTime(ms) {
            let m = Math.floor(ms / 60000), s = Math.floor((ms % 60000) / 1000), mil = Math.floor((ms % 1000) / 10);
            return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}:${String(mil).padStart(2, '0')}`;
        }

        // --- 其他原有功能 ---
        function resize(delta) { fontSize += delta; if(fontSize < 40) fontSize = 40; updateDisplay(); localStorage.setItem('myFontSize', fontSize); }
        
        function safeReset() {
            if (confirm("⚠️ 確定要歸零計數嗎？")) {
                if (count > 0) saveHistory(count);
                count = 0; updateDisplay();
            }
        }

        function saveHistory(val) {
            historyArr.unshift({time: new Date().toLocaleString(), val: val});
            historyArr = historyArr.slice(0, 20);
            localStorage.setItem('myHistory', JSON.stringify(historyArr));
        }

        document.getElementById('click-area').onclick = () => { count++; updateDisplay(); };

        document.getElementById('stop-btn').onclick = () => {
            if (running) toggleAudioAndTimer(); // 如果還在跑，先觸發停止
            if (elapsedTime > 0 || count > 0) {
                alert("練習結束！\n耗時：" + formatTime(elapsedTime) + "\n累計次數：" + count);
                if(count > 0) saveHistory(count);
                elapsedTime = 0;
                count = 0;
                document.getElementById('timer-display').innerText = "00:00:00";
                updateDisplay();
            }
        };

        // --- 上半部手勢 ---
        const slider = document.getElementById('slider');
        const dot1 = document.getElementById('dot1');
        const dot2 = document.getElementById('dot2');
        let startX_slide = 0, currentSlide = 0;

        document.getElementById('top-section').addEventListener('touchstart', (e) => {
            if(e.touches.length === 1) startX_slide = e.touches[0].pageX;
        }, {passive: true});

        document.getElementById('top-section').addEventListener('touchend', (e) => {
            let diff = startX_slide - e.changedTouches[0].pageX;
            if (Math.abs(diff) > 80) {
                currentSlide = diff > 0 ? 1 : 0;
                slider.style.transform = `translateX(-${currentSlide * 50}%)`;
                dot1.classList.toggle('active', currentSlide === 0);
                dot2.classList.toggle('active', currentSlide === 1);
            }
        });

        function setupTouch(id) {
            let el = document.getElementById(id), scale = 1, lastScale = 1, posX = 0, posY = 0, lastPosX = 0, lastPosY = 0, sDist = 0, sX = 0, sY = 0;
            el.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) { sX = e.touches[0].pageX; sY = e.touches[0].pageY; }
                else if (e.touches.length === 2) sDist = Math.hypot(e.touches[0].pageX-e.touches[1].pageX, e.touches[0].pageY-e.touches[1].pageY);
            }, {passive: false});
            el.addEventListener('touchmove', (e) => {
                if (e.touches.length > 0) e.preventDefault();
                if (e.touches.length === 1) {
                    posX = lastPosX + (e.touches[0].pageX - sX);
                    posY = lastPosY + (e.touches[0].pageY - sY);
                } else if (e.touches.length === 2) {
                    let d = Math.hypot(e.touches[0].pageX-e.touches[1].pageX, e.touches[0].pageY-e.touches[1].pageY);
                    scale = lastScale * (d / sDist);
                }
                el.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
            }, {passive:false});
            el.addEventListener('touchend', () => { lastPosX = posX; lastPosY = posY; lastScale = scale; });
        }
        setupTouch('green-dot');
        setupTouch('buddha-img');

        function toggleHistory() {
            const p = document.getElementById('history-panel');
            const isHidden = p.style.display === 'none' || p.style.display === '';
            p.style.display = isHidden ? 'block' : 'none';
            if(isHidden) {
                document.getElementById('hist-list').innerHTML = historyArr.length ? historyArr.map(h => 
                    `<div style="border-bottom:1px solid #eee; padding:8px 5px; font-size:12px;">
                        <span style="color:#666;">${h.time}</span><br>
                        <b>計數：${h.val} 次</b>
                    </div>`).join('') : "暫無紀錄";
            }
        }
        document.getElementById('history-btn').onclick = toggleHistory;

        updateDisplay();
    </script>
</body>
</html>
