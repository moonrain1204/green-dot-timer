<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>佛系計數計時器 v1.4</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #F5F5DC; font-family: sans-serif; user-select: none; }

        /* 上半部 */
        #top-section {
            height: 40vh; width: 100%; background: #ffffff; border-bottom: 2px solid #8B4513;
            position: relative; overflow: hidden; touch-action: none;
        }
        #slider { display: flex; width: 200%; height: 100%; transition: transform 0.3s ease; }
        .slide-page { width: 50%; height: 100%; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; }
        #green-dot { width: 100px; height: 100px; background-color: #008000; border-radius: 50%; transform: translate(0,0) scale(1); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #buddha-img { max-height: 90%; max-width: 90%; transform: translate(0,0) scale(1); object-fit: contain; }

        /* 下半部 */
        #bottom-section { height: 60vh; width: 100%; position: relative; display: flex; flex-direction: column; align-items: center; padding-top: 5px; }
        #click-area { width: 100%; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; }
        #sacred-text { color: #8B4513; font-family: '標楷體'; font-size: 22px; font-weight: 900; margin-bottom: 2px; }
        #counter { color: #00008B; font-size: 80px; font-weight: bold; line-height: 1; }
        #timer-display { font-size: 1.2rem; font-family: monospace; color: #444; font-weight: bold; }
        #projection-info { font-size: 0.9rem; color: #d35400; font-weight: bold; margin-top: 5px; text-align: center; line-height: 1.3; }

        /* 按鈕區 */
        .ui-panel { width: 95%; display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; margin-bottom: 10px; }
        .btn { padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; transition: background 0.3s; }
        
        #audio-toggle-btn { background-color: #4A90E2; flex: 1; font-size: 1rem; }
        #audio-toggle-btn.playing { background-color: #555; }
        #auto-btn { background-color: #27ae60; min-width: 60px; }
        #auto-btn.active { background-color: #e67e22; }

        .btn-timer-stop { background-color: #e74c3c; flex: 1 1 100%; margin-top: 2px; } 
        .btn-reset { background-color: #d9534f; font-size: 12px; }
        
        #history-btn { position: absolute; right: 15px; top: -50px; width: 40px; height: 40px; border-radius: 50%; background: #fff; border: 2px solid #8B4513; display: flex; align-items: center; justify-content: center; font-size: 20px; z-index: 200; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        #history-panel { position: absolute; top: -10px; right: 15px; width: 240px; background: white; border: 2px solid #8B4513; border-radius: 8px; display: none; z-index: 1000; padding: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .dot-nav { width: 6px; height: 6px; border-radius: 50%; background: #ccc; }
        .dot-nav.active { background: #8B4513; }
    </style>
</head>
<body>
    <div id="top-section">
        <div id="slider">
            <div class="slide-page"><div id="green-dot"></div></div>
            <div class="slide-page"><img id="buddha-img" src="1000010289.png" alt="大自在王佛"></div>
        </div>
        <div id="history-btn">🕒</div>
    </div>

    <div id="bottom-section">
        <div id="history-panel">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <strong>歷史紀錄</strong>
                <span onclick="toggleHistory()" style="cursor:pointer; font-size: 20px;">✕</span>
            </div>
            <div id="hist-list" style="max-height: 250px; overflow-y: auto;"></div>
        </div>
        
        <div id="click-area" onclick="manualCount()">
            <div id="sacred-text">南無本師大自在王佛</div>
            <div id="counter">0</div>
            <div id="timer-display">00:00:00</div>
            <div id="projection-info"></div>
        </div>

        <div class="ui-panel">
            <button id="audio-toggle-btn" class="btn" onclick="toggleAudioAndTimer()">▶ 播放/計時</button>
            <button id="auto-btn" class="btn" onclick="toggleAuto()">自動</button>
            
            <div style="display:flex; gap:6px; width: 100%; justify-content: center;">
                <button class="btn btn-reset" onclick="safeReset()">歸零</button>
                <button class="btn" style="background:#8B4513;" onclick="resize(-10)">－</button>
                <button class="btn" style="background:#8B4513;" onclick="resize(10)">＋</button>
            </div>

            <button id="stop-btn" class="btn btn-timer-stop">結束並記錄本次練習</button>
        </div>
    </div>

    <audio id="sacred-audio" src="南無本師大自在王佛.wav" preload="auto" loop></audio>

    <script>
        let count = parseInt(localStorage.getItem('myCounter')) || 0;
        let fontSize = parseInt(localStorage.getItem('myFontSize')) || 80;
        let historyArr = JSON.parse(localStorage.getItem('myHistory')) || [];
        let timerInterval, autoInterval, elapsedTime = 0, startTime, running = false, autoRunning = false;
        const audio = document.getElementById('sacred-audio');
        const toggleBtn = document.getElementById('audio-toggle-btn');
        const autoBtn = document.getElementById('auto-btn');
        const projInfo = document.getElementById('projection-info');

        function updateDisplay() {
            document.getElementById('counter').innerText = count;
            document.getElementById('counter').style.fontSize = fontSize + "px";
            localStorage.setItem('myCounter', count);
            
            if (count >= 30000) {
                projInfo.innerText = "九字禪已達成三萬聲！";
            } else if (count > 0 && elapsedTime > 0) {
                const msPerCount = elapsedTime / count;
                const remaining = 30000 - count;
                const totalRemainingMs = remaining * msPerCount;
                const finishTime = new Date(Date.now() + totalRemainingMs);
                projInfo.innerHTML = `預估三萬聲尚需: ${formatTime(totalRemainingMs)}<br>預計完成時間: ${finishTime.getHours()}:${String(finishTime.getMinutes()).padStart(2,'0')}`;
            } else {
                projInfo.innerText = "";
            }
        }

        function manualCount() {
            count++;
            if(autoRunning) toggleAuto();
            updateDisplay();
        }

        function toggleAudioAndTimer() {
            if (!running) {
                audio.play();
                startTimer();
                toggleBtn.innerText = "■ 停止";
                toggleBtn.classList.add('playing');
            } else {
                audio.pause();
                pauseTimer();
                if(autoRunning) toggleAuto();
                toggleBtn.innerText = "▶ 播放/計時";
                toggleBtn.classList.remove('playing');
            }
        }

        function toggleAuto() {
            if (!autoRunning) {
                if(!running) return alert("請先開啟音檔與計時");
                autoInterval = setInterval(() => { count++; updateDisplay(); }, 500);
                autoBtn.innerText = "停止自動";
                autoBtn.classList.add('active');
                autoRunning = true;
            } else {
                clearInterval(autoInterval);
                autoBtn.innerText = "自動";
                autoBtn.classList.remove('active');
                autoRunning = false;
            }
        }

        function startTimer() {
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const now = Date.now();
                document.getElementById('timer-display').innerText = formatTime(elapsedTime + (now - startTime));
                updateDisplay();
            }, 1000);
            running = true;
        }

        function pauseTimer() {
            clearInterval(timerInterval);
            elapsedTime += (Date.now() - startTime);
            running = false;
        }

        function formatTime(ms) {
            let totalSec = Math.floor(ms / 1000);
            let h = Math.floor(totalSec / 3600), m = Math.floor((totalSec % 3600) / 60), s = totalSec % 60;
            return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        function resize(delta) { fontSize += delta; if(fontSize < 30) fontSize = 30; updateDisplay(); localStorage.setItem('myFontSize', fontSize); }
        
        function safeReset() {
            if (confirm("⚠️ 確定要歸零計數嗎？")) {
                if (count > 0) saveHistory(count, formatTime(elapsedTime));
                count = 0; updateDisplay();
            }
        }

        function saveHistory(val, duration) {
            const now = new Date();
            const timeStr = `${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`;
            historyArr.unshift({time: now.toLocaleString(), end: timeStr, duration: duration, val: val});
            historyArr = historyArr.slice(0, 20);
            localStorage.setItem('myHistory', JSON.stringify(historyArr));
        }

        document.getElementById('stop-btn').onclick = () => {
            if (running) toggleAudioAndTimer();
            if (elapsedTime > 0 || count > 0) {
                const finalDuration = formatTime(elapsedTime);
                const endTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                alert(`練習結束！\n總需時長：${finalDuration}\n結束時間：${endTime}\n累計次數：${count}`);
                if(count > 0) saveHistory(count, finalDuration);
                elapsedTime = 0; count = 0;
                document.getElementById('timer-display').innerText = "00:00:00";
                updateDisplay();
            }
        };

        function toggleHistory() {
            const p = document.getElementById('history-panel');
            const isHidden = p.style.display === 'none' || p.style.display === '';
            p.style.display = isHidden ? 'block' : 'none';
            if(isHidden) {
                document.getElementById('hist-list').innerHTML = historyArr.length ? historyArr.map(h => 
                    `<div style="border-bottom:1px solid #eee; padding:8px 5px; font-size:12px;">
                        ${h.time} | <b>${h.val}次 | ${h.duration}</b>
                    </div>`).join('') : "暫無紀錄";
            }
        }
        document.getElementById('history-btn').onclick = toggleHistory;
        updateDisplay();
    </script>
</body>
</html>
